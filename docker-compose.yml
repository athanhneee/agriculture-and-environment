services:
  postgres:
    image: postgres:16
    container_name: smart_farm_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_farm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-smart_farm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_farm} -d ${POSTGRES_DB:-smart_farm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
